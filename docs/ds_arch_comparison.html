<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Direction-Speed Visualizer</title>
  <style>
    :root { color-scheme: dark; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #020617; color: #e2e8f0; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    main { width: min(720px, calc(100vw - 32px)); padding: 28px; border: 1px solid #1e293b; border-radius: 16px; background: #0f172a; }
    h1 { margin: 0 0 12px; font-size: 24px; }
    p { color: #94a3b8; line-height: 1.7; }
    code { padding: 2px 6px; border-radius: 6px; background: #1e293b; color: #f8fafc; }
    a { color: #67e8f9; }
  </style>
</head>
<body>
  <main>
    <h1>Direction-Speed 可视化已迁移</h1>
    <p>前端展示现在是独立 Vite（前端构建工具）项目，源码位于 <a href="./ds-visualizer/">docs/ds-visualizer</a>。</p>
    <p>请在仓库根目录执行：<code>cd docs/ds-visualizer && npm install && npm run dev</code>。</p>
    <p>生产预览可执行：<code>npm run build && npm run preview</code>。</p>
  </main>
</body>
</html>
